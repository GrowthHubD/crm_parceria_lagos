# baileys@7.0.0-rc.9 declara libsignal via git-repository. pnpm 11 bloqueia
# subdeps exoticas por default (blockExoticSubdeps). Permitir explicitamente —
# libsignal é o lib legítimo de Signal Protocol, requerido pelo baileys.
blockExoticSubdeps: false
allowBuilds:
  '@ffmpeg-installer/ffmpeg': true
  '@ffmpeg-installer/linux-x64': true
  '@whiskeysockets/baileys': true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  workerd: true
onlyBuiltDependencies:
  - '@ffmpeg-installer/ffmpeg'
  - '@ffmpeg-installer/linux-x64'
  - '@whiskeysockets/baileys'
  - esbuild
  - msw
  - protobufjs
  - sharp
  - unrs-resolver
  - workerd
